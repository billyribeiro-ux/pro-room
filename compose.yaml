name: pro-room

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proroom
      POSTGRES_PASSWORD: proroom
      POSTGRES_DB: proroom
    ports:
      # Host 5433 (not 5432) to avoid clashing with other local Postgres
      # instances; matches server/.env DATABASE_URL.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proroom -d proroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host 6380 (not 6379) to avoid clashing with other local Redis
      # instances; matches server/.env REDIS_URL.
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
